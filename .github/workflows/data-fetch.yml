name: Daily Portfolio Data Fetch

on:
  schedule:
    - cron: "0 0 * * *" # Runs exactly once a day at 00:00 UTC
  workflow_dispatch: # Keeps the manual run button for testing

jobs:
  generate-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the JSON files back to the repo

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Bun runtime
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Create API directories
        run: mkdir -p api/readmes

      - name: 4. Fetch Data (Fails fast on API error)
        # Using the built-in token provided by GitHub Actions
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: bun run build-data.ts

      - name: 5. Commit and Push Changes
        # This step ONLY runs if Step 4 succeeds completely
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily update of portfolio data" && git push)
