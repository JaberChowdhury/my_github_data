name: Daily Portfolio Data Fetch

on:
  schedule:
    - cron: "0 6 * * *" # Runs at 12:00 PM Bangladesh Time (06:00 UTC)
  workflow_dispatch:

jobs:
  generate-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Fetch Data and Generate JSON
        env:
          PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: bun run build-data.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update portfolio data" && git push)
